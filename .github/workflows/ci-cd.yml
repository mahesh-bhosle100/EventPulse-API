name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config libjpeg-dev zlib1g-dev libfreetype6-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: |
          set +e
          pytest --tb=short -v
          code=$?
          set -e
          if [ $code -eq 5 ]; then
            echo "No tests collected; treating as success."
            exit 0
          fi
          exit $code


  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check deploy secrets
        id: deploy_check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$SERVER_HOST" ] && [ -n "$SERVER_USER" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.deploy_check.outputs.can_deploy == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/event_ticketing
            git pull origin main
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --settings=config.settings.prod
            docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput --settings=config.settings.prod
            echo "Deployment complete!"
      - name: Skip deploy (missing secrets)
        if: steps.deploy_check.outputs.can_deploy != 'true'
        run: echo "Deploy skipped: missing SERVER_HOST/SERVER_USER/SSH_PRIVATE_KEY secrets."
